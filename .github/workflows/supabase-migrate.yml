name: Apply Supabase migrations

# Auto-applies any new SQL in supabase/migrations/** to the production Supabase
# project when they land on main. Lets git be the source of truth for the task
# board — no one has to paste SQL into the dashboard.
#
# One-time setup (in GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   personal access token (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_DB_PASSWORD    the project's database password
#   SUPABASE_PROJECT_ID     project ref — currently rbuynvswyplfyxuxpyxy
#
# Manual run: Actions tab → "Apply Supabase migrations" → Run workflow.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
