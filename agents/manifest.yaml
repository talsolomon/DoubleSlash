---
name: duble-slash-agents
description: Two-layer FLOW agent system — operators (Dora/Sol/Bran/May) + experts (Design/PM/Dev/...) + helpers.
version: 0.1.0
method: FLOW
method_spec: methodology/flow.md
date: 2026-04-25
---

modules:
  operators:
    path: agents/operators
    type: layer-1
    description: Phase-bound operators. One per FLOW phase (head, left body, right body, tail).
  experts:
    path: agents/experts
    type: layer-2
    status: planned                   # directory not yet authored; the [E] loan-in path in
                                      # operator menus is reserved for when the first expert ships.
    description: Domain-bound experts. Loaned in from operator turns via @handle, or invoked directly.
  helpers:
    path: agents/helpers
    type: cross-cutting
    description: Shared utilities invoked from operator or expert workflow steps.

config_layering:
  order:
    - agents/config.yaml                # project-wide
    - .flow/flow.yaml                   # team overrides (optional)
    - project-context.md                # per-repo context (optional)
  conflict_resolution: later-layers-win-for-non-conflicting-keys

manifests:
  operators: agents/operator-manifest.csv  # persona-shaped — one row per operator. Helpers
                                           # are not personas; they're enumerated in skills below.
  skills: agents/skill-manifest.csv        # full roster: operators + sub-skills + helpers.
