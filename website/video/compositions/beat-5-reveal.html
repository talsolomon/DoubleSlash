    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="beat-5-reveal"] ';

        // Panel unfurls from top (beacon direction)
        tl.fromTo(
          scope + ".panel",
          { opacity: 0, scaleY: 0.1 },
          { opacity: 1, scaleY: 1, duration: 0.55, ease: "expo.out" },
          0.05
        );

        // FISH diamond curves draw in
        tl.to(
          scope + ".diamond-top",
          { strokeDashoffset: 0, duration: 0.9, ease: "power2.out" },
          0.6
        );
        tl.to(
          scope + ".diamond-bottom",
          { strokeDashoffset: 0, duration: 0.9, ease: "power2.out" },
          0.75
        );

        // Nodes stagger-fade
        tl.to(scope + ".node-1", { opacity: 1, duration: 0.3 }, 0.9);
        tl.fromTo(scope + ".label-1", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 1.0);
        tl.to(scope + ".node-2", { opacity: 1, duration: 0.3 }, 1.05);
        tl.fromTo(scope + ".label-2", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 1.15);
        tl.to(scope + ".node-3", { opacity: 1, duration: 0.3 }, 1.2);
        tl.fromTo(scope + ".label-3", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 1.3);
        tl.to(scope + ".node-4", { opacity: 1, duration: 0.3 }, 1.35);
        tl.fromTo(scope + ".label-4", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 1.45);

        // Build node pulses green (it's the current position)
        tl.to(
          scope + ".node-3",
          { attr: { r: 22 }, duration: 0.4, ease: "power2.out" },
          1.7
        );
        tl.to(
          scope + ".node-3",
          { attr: { r: 18 }, duration: 0.5, ease: "power2.in" },
          2.1
        );

        // Progress tip fades in
        tl.fromTo(
          scope + ".progress-tip",
          { opacity: 0 },
          { opacity: 1, duration: 0.4, ease: "power2.out" },
          1.8
        );

        // Linear cards stagger
        const linearCards = document.querySelectorAll(scope + ".linear-card");
        linearCards.forEach((card, i) => {
          tl.fromTo(
            card,
            { opacity: 0, y: 6 },
            { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" },
            0.8 + i * 0.08
          );
        });

        // GH rows stagger
        const ghRows = document.querySelectorAll(scope + ".gh-row");
        ghRows.forEach((row, i) => {
          tl.fromTo(
            row,
            { opacity: 0, x: 10 },
            { opacity: 1, x: 0, duration: 0.35, ease: "power3.out" },
            1.0 + i * 0.12
          );
        });

        // DESIGNER-FRIENDLY long hold 0.3s–3.5s
        tl.fromTo(
          scope + ".word-flash",
          { opacity: 0, y: 30 },
          { opacity: 0.28, y: 0, duration: 1.0, ease: "power3.out" },
          0.3
        );
        tl.to(scope + ".word-flash", { opacity: 0, duration: 0.5, ease: "power2.in" }, 3.3);

        window.__timelines["beat-5-reveal"] = tl;
      })();
    </script>
