<template id="beat-1-void-template">
  <div data-composition-id="beat-1-void" data-start="0" data-duration="2.0" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="beat-1-void"] {
        width: 100%;
        height: 100%;
        position: relative;
        background: #07080B;
        overflow: hidden;
      }
      [data-composition-id="beat-1-void"] .logomark {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(0deg);
        width: 420px;
        height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 48px;
      }
      [data-composition-id="beat-1-void"] .slash {
        position: relative;
        width: 72px;
        height: 320px;
        transform: rotate(-18deg);
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: stretch;
        justify-content: center;
      }
      [data-composition-id="beat-1-void"] .slash .bar {
        width: 100%;
        background: #0e3a35;
        border-radius: 4px;
        flex: 1;
        opacity: 0.4;
      }
    </style>

    <div class="logomark">
      <div class="slash slash-left">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div class="slash slash-right">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const scope = '[data-composition-id="beat-1-void"] ';

        tl.set(scope + ".logomark", { opacity: 0 }, 0);
        tl.set(scope + ".bar", { opacity: 0.15 }, 0);

        tl.to(
          scope + ".logomark",
          { opacity: 0.35, duration: 1.2, ease: "power2.out" },
          0.3
        );

        const leftBars = document.querySelectorAll(scope + ".slash-left .bar");
        const rightBars = document.querySelectorAll(scope + ".slash-right .bar");

        leftBars.forEach((bar, i) => {
          const seed = 0.12 + ((i * 0.17) % 0.14);
          tl.to(
            bar,
            { opacity: seed + 0.1, duration: 0.5, ease: "sine.inOut" },
            0.4 + i * 0.08
          );
          tl.to(
            bar,
            { opacity: seed, duration: 0.5, ease: "sine.inOut" },
            0.9 + i * 0.08
          );
        });
        rightBars.forEach((bar, i) => {
          const seed = 0.14 + ((i * 0.13) % 0.12);
          tl.to(
            bar,
            { opacity: seed + 0.1, duration: 0.5, ease: "sine.inOut" },
            0.5 + i * 0.08
          );
          tl.to(
            bar,
            { opacity: seed, duration: 0.5, ease: "sine.inOut" },
            1.0 + i * 0.08
          );
        });

        window.__timelines["beat-1-void"] = tl;
      })();
    </script>
  </div>
</template>
