<template id="beat-3-moment-template">
  <div data-composition-id="beat-3-moment" data-start="0" data-duration="6.55" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="beat-3-moment"] {
        width: 100%;
        height: 100%;
        position: relative;
        background: #07080B;
        overflow: hidden;
      }

      /* Dark Claude window */
      [data-composition-id="beat-3-moment"] .claude-window {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 1280px;
        height: 800px;
        background: #12141A;
        border: 1px solid #1E2028;
        border-radius: 18px;
        overflow: hidden;
        opacity: 0;
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03);
      }
      [data-composition-id="beat-3-moment"] .claude-titlebar {
        height: 48px;
        background: #0E1016;
        border-bottom: 1px solid #1E2028;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
      }
      [data-composition-id="beat-3-moment"] .traffic {
        display: flex;
        gap: 8px;
      }
      [data-composition-id="beat-3-moment"] .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #2a2d34;
      }
      [data-composition-id="beat-3-moment"] .claude-title {
        color: #6B6E76;
        font-family: "Fraunces", serif;
        font-size: 15px;
        font-weight: 500;
        margin-left: 12px;
      }

      [data-composition-id="beat-3-moment"] .claude-body {
        position: relative;
        height: calc(100% - 48px);
        padding: 48px 60px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      /* Agent chips stack — top-right area of body */
      [data-composition-id="beat-3-moment"] .agent-chips {
        position: absolute;
        top: 36px;
        right: 60px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: flex-end;
      }
      [data-composition-id="beat-3-moment"] .agent-chip {
        background: rgba(61, 217, 182, 0.08);
        border-left: 2px solid #3dd9b6;
        padding: 14px 22px;
        border-radius: 4px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 22px;
        color: #F2EFE8;
        letter-spacing: -0.005em;
        opacity: 0;
        white-space: nowrap;
      }
      [data-composition-id="beat-3-moment"] .agent-chip .prefix {
        color: #3dd9b6;
      }

      /* Input field at bottom */
      [data-composition-id="beat-3-moment"] .input-wrap {
        background: #0E1016;
        border: 1px solid #1E2028;
        border-radius: 14px;
        padding: 22px 28px;
        display: flex;
        align-items: center;
        gap: 14px;
        position: relative;
      }
      [data-composition-id="beat-3-moment"] .input-text {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 36px;
        font-weight: 500;
        color: #F2EFE8;
        letter-spacing: -0.01em;
        flex: 1;
        min-height: 48px;
      }
      [data-composition-id="beat-3-moment"] .slash-char {
        color: #3dd9b6;
        font-weight: 700;
        display: inline-block;
        opacity: 0;
      }
      [data-composition-id="beat-3-moment"] .caret {
        width: 3px;
        height: 40px;
        background: #F2EFE8;
        display: inline-block;
        vertical-align: middle;
        animation: caret-blink 1s infinite;
      }
      @keyframes caret-blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      [data-composition-id="beat-3-moment"] .send-btn {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: #1E2028;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6B6E76;
        font-size: 20px;
      }

      /* FISH palette — appears under input when // fires */
      [data-composition-id="beat-3-moment"] .fish-palette {
        position: absolute;
        left: 28px;
        right: 28px;
        bottom: 120px;
        background: rgba(14, 16, 22, 0.92);
        border: 1px solid #1E2028;
        border-radius: 12px;
        padding: 22px 26px;
        display: flex;
        align-items: center;
        gap: 24px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 24px;
        color: #F2EFE8;
        opacity: 0;
        transform: translateY(10px);
      }
      [data-composition-id="beat-3-moment"] .fish-label {
        color: #3dd9b6;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-right: 4px;
      }
      [data-composition-id="beat-3-moment"] .fish-chip {
        padding: 10px 20px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid #1E2028;
        opacity: 0;
        transform: translateY(8px);
        letter-spacing: 0.01em;
      }
      [data-composition-id="beat-3-moment"] .fish-sep {
        color: #6B6E76;
        opacity: 0.5;
      }

      /* Word flashes in margin */
      [data-composition-id="beat-3-moment"] .word-flash {
        position: absolute;
        top: 60px;
        left: 60px;
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-weight: 400;
        font-size: 120px;
        color: #F2EFE8;
        opacity: 0;
        white-space: nowrap;
      }
      [data-composition-id="beat-3-moment"] .word-flash.flash-innovative {
        top: auto;
        bottom: 100px;
        left: auto;
        right: 80px;
      }

      /* Docked beacon top-right of stage */
      [data-composition-id="beat-3-moment"] .beacon {
        position: absolute;
        top: 60px;
        right: 80px;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        opacity: 0;
      }
      [data-composition-id="beat-3-moment"] .beacon .slash {
        width: 14px;
        height: 54px;
        transform: rotate(-18deg);
        border-radius: 2px;
      }
      [data-composition-id="beat-3-moment"] .beacon .slash-left {
        background: #3dd9b6;
      }
      [data-composition-id="beat-3-moment"] .beacon .slash-right {
        background: #FFFBF0;
      }
    </style>

    <div class="word-flash flash-smart">SMART</div>
    <div class="word-flash flash-innovative">INNOVATIVE</div>

    <div class="beacon">
      <div class="slash slash-left"></div>
      <div class="slash slash-right"></div>
    </div>

    <div class="claude-window">
      <div class="claude-titlebar">
        <div class="traffic"><span></span><span></span><span></span></div>
        <div class="claude-title">Claude</div>
      </div>
      <div class="claude-body">
        <div class="agent-chips">
          <div class="agent-chip chip-1">
            <span class="prefix">// Solidifier</span> · picking up pricing-page from Tuesday
          </div>
          <div class="agent-chip chip-2">
            <span class="prefix">// Capture</span> · session linked
          </div>
          <div class="agent-chip chip-3">
            <span class="prefix">// Next move</span> · tier table review
          </div>
        </div>

        <div class="fish-palette">
          <span class="fish-label">FISH</span>
          <span class="fish-chip chip-explore">Explore</span>
          <span class="fish-sep">·</span>
          <span class="fish-chip chip-solidify">Solidify</span>
          <span class="fish-sep">·</span>
          <span class="fish-chip chip-build">Build</span>
          <span class="fish-sep">·</span>
          <span class="fish-chip chip-ship">Ship</span>
        </div>

        <div class="input-wrap">
          <div class="input-text">
            <span class="slash-char slash-1">/</span><span class="slash-char slash-2">/</span>
          </div>
          <div class="caret"></div>
          <div class="send-btn">↵</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="beat-3-moment"] ';

        // Narration lands at beat-3 local time:
        // 0.00 — "Type two slashes" starts
        // 1.36 — "one of four agents..."
        // 4.14 — "Explore"
        // 5.00 — "Solidify"
        // 5.57 — "Build"
        // 6.17 — "Ship"

        // 0.0–0.5s: Claude window fades in, beacon too
        tl.to(scope + ".claude-window", { opacity: 1, duration: 0.5, ease: "expo.out" }, 0);
        tl.to(scope + ".beacon", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0.1);

        // 0.6–0.9s: two keystrokes — "Type two slashes"
        tl.to(scope + ".slash-1", { opacity: 1, duration: 0.1 }, 0.7);
        tl.to(scope + ".slash-2", { opacity: 1, duration: 0.1 }, 0.95);

        // 1.0s: FISH palette blooms
        tl.to(
          scope + ".fish-palette",
          { opacity: 1, y: 0, duration: 0.4, ease: "expo.out" },
          1.0
        );

        const chips = [
          scope + ".chip-explore",
          scope + ".chip-solidify",
          scope + ".chip-build",
          scope + ".chip-ship",
        ];
        chips.forEach((sel, i) => {
          tl.to(
            sel,
            { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" },
            1.1 + i * 0.12
          );
        });

        // 1.9–3.5s: agent chips appear
        tl.fromTo(
          scope + ".chip-1",
          { opacity: 0, x: 20 },
          { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" },
          1.9
        );
        tl.fromTo(
          scope + ".chip-2",
          { opacity: 0, x: 20 },
          { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" },
          2.5
        );
        tl.fromTo(
          scope + ".chip-3",
          { opacity: 0, x: 20 },
          { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" },
          3.1
        );

        // SMART word-flash 1.5–2.6s
        tl.fromTo(
          scope + ".flash-smart",
          { opacity: 0, y: 30 },
          { opacity: 0.9, y: 0, duration: 0.5, ease: "power3.out" },
          1.5
        );
        tl.to(scope + ".flash-smart", { opacity: 0, duration: 0.4, ease: "power2.in" }, 2.2);

        // INNOVATIVE word-flash 3.5–4.6s
        tl.fromTo(
          scope + ".flash-innovative",
          { opacity: 0, y: 30 },
          { opacity: 0.9, y: 0, duration: 0.5, ease: "power3.out" },
          3.5
        );
        tl.to(scope + ".flash-innovative", { opacity: 0, duration: 0.4, ease: "power2.in" }, 4.3);

        // Phase chip glows synced to narration
        const glowMap = [
          { sel: scope + ".chip-explore", at: 4.14 },
          { sel: scope + ".chip-solidify", at: 5.0 },
          { sel: scope + ".chip-build", at: 5.57 },
          { sel: scope + ".chip-ship", at: 6.17 },
        ];
        glowMap.forEach(({ sel, at }) => {
          tl.to(
            sel,
            {
              scale: 1.05,
              boxShadow: "0 0 28px rgba(61, 217, 182, 0.6)",
              backgroundColor: "rgba(61, 217, 182, 0.15)",
              duration: 0.25,
              ease: "power2.out",
            },
            at
          );
          tl.to(
            sel,
            {
              scale: 1,
              boxShadow: "0 0 0 rgba(61, 217, 182, 0)",
              backgroundColor: "rgba(255, 255, 255, 0.035)",
              duration: 0.35,
              ease: "power2.in",
            },
            at + 0.25
          );
        });

        window.__timelines["beat-3-moment"] = tl;
      })();
    </script>
  </div>
</template>
